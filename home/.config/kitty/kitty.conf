# Remote control: allow commands only via Unix socket (not from programs inside kitty)
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

window_padding_width 4

font_size 14

font_family Inconsolata
# font_family         IosevkaTerm Mono

bold_font auto
italic_font auto
bold_italic_font auto

hide_window_decorations no

# background_opacity 0.95
# dynamic_background_opacity yes

# Detected URLs are highlighted with an underline and the mouse cursor becomes a
# hand over them. Even if this option is disabled, URLs are still clickable.
detect_urls no

# Show the URL of the hyperlink target under the mouse cursor
show_hyperlink_targets yes

# Control how hyperlinks are underlined. [never, hover, always]
underline_hyperlinks always

# Number of lines of history to keep in memory for scrolling back
scrollback_lines 50000

# Separate scrollback history size (in MB), used only for browsing the scrollback buffer with pager
# Set to 0 to disable size limit
scrollback_pager_history_size 0

# Have kitty quit when all the top-level windows are closed on macOS.
macos_quit_when_last_window_closed yes

# Disable update check
update_check_interval 0

# == Keybindings ==

# Reload and print message
map ctrl+shift+f5 load_config_file
map f5 load_config_file

# Dump lines with attributes
map cmd+shift+d dump_lines_with_attrs

# Open windows/tabs in the current directory.
#
# These go through shell_reentry.py so that if the source window advertises
# a K_SHELL_REENTRY command (via the k-shell-helper script), the new window
# re-enters that wrapped context (docker exec, ssh, ...) instead of opening
# a bare host shell. If no advertisement is present, behaviour collapses to
# the stock `launch --cwd=current --type=...`.
#
# See ~/.config/kitty/shell-reentry.md for the protocol.
#
# Originals (kept commented for quick rollback):
# map ctrl+shift+enter launch --cwd=current --type=window
# map ctrl+shift+n launch --cwd=current --type=os-window
# map ctrl+shift+t launch --cwd=current --type=tab
# map cmd+t launch --cwd=current --type=tab
# map cmd+enter launch --cwd=current --type=window
# map cmd+n launch --cwd=current --type=os-window
map ctrl+shift+enter kitten shell_reentry.py window
map ctrl+shift+n kitten shell_reentry.py os-window
map ctrl+shift+t kitten shell_reentry.py tab
map cmd+t kitten shell_reentry.py tab
map cmd+enter kitten shell_reentry.py window
map cmd+n kitten shell_reentry.py os-window

# == END ==
